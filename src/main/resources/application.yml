server:
  port: 8081

spring:
  application:
    name: bookstore

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bookstore?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.bookstore.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: "bookstore-secret-key-for-jwt-token-generation-2024"
  expiration: 86400000

logging:
  level:
    com.example.bookstore: debug