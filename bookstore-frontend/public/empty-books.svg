<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ede6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Book stack icon -->
  <g transform="translate(140, 60)">
    <rect x="0" y="50" width="120" height="20" rx="3" fill="#7a9e7e" opacity="0.6"/>
    <rect x="5" y="30" width="110" height="20" rx="3" fill="#b08d57" opacity="0.6"/>
    <rect x="10" y="10" width="100" height="20" rx="3" fill="#c94043" opacity="0.6"/>
    <rect x="15" y="-10" width="90" height="20" rx="3" fill="#1a1a1a" opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="200" y="200" font-family="'Noto Serif SC', serif" font-size="18" fill="#666" text-anchor="middle">暂无书籍</text>
  <text x="200" y="230" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#999" text-anchor="middle">没有找到相关书籍</text>
</svg>