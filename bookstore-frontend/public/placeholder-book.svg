<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F4F4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Book spine -->
  <rect x="10" y="20" width="20" height="360" fill="url(#spine)" rx="3"/>
  <!-- Book cover -->
  <rect x="30" y="20" width="240" height="360" fill="url(#cover)" rx="5"/>
  <!-- Decorative border -->
  <rect x="45" y="50" width="210" height="300" fill="none" stroke="#b08d57" stroke-width="2" rx="3"/>
  <!-- Book title placeholder lines -->
  <rect x="60" y="100" width="180" height="8" fill="#b08d57" rx="2"/>
  <rect x="60" y="120" width="150" height="6" fill="#7a9e7e" rx="2"/>
  <!-- Author placeholder -->
  <rect x="60" y="280" width="120" height="6" fill="#666" rx="2"/>
  <rect x="60" y="295" width="80" height="4" fill="#888" rx="2"/>
  <!-- Decorative element -->
  <circle cx="150" cy="200" r="30" fill="none" stroke="#b08d57" stroke-width="1.5"/>
  <text x="150" y="207" font-family="serif" font-size="24" fill="#b08d57" text-anchor="middle">書</text>
</svg>