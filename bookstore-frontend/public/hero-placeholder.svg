<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="320" cy="40" r="60" fill="none" stroke="#c94043" stroke-width="0.5" opacity="0.3"/>
  <circle cx="80" cy="160" r="40" fill="none" stroke="#7a9e7e" stroke-width="0.5" opacity="0.3"/>
  <!-- Book icon -->
  <rect x="170" y="60" width="60" height="80" rx="3" fill="none" stroke="#b08d57" stroke-width="2"/>
  <text x="200" y="110" font-family="serif" font-size="28" fill="#b08d57" text-anchor="middle">書</text>
