<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ede6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg)"/>
  <!-- Cart icon -->
  <g transform="translate(100, 80)">
    <path d="M0 20 L10 20 L30 80 L90 80 L110 30 L30 30"
          fill="none" stroke="#b08d57" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="45" cy="100" r="12" fill="none" stroke="#b08d57" stroke-width="3"/>
    <circle cx="75" cy="100" r="12" fill="none" stroke="#b08d57" stroke-width="3"/>
  </g>
  <!-- Text -->
  <text x="150" y="220" font-family="'Noto Serif SC', serif" font-size="16" fill="#666" text-anchor="middle">购物车为空</text>
  <text x="150" y="250" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#999" text-anchor="middle">快去挑选心仪的书籍吧</text>
</svg>